<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>PropFirmScanner Academy — Prop Firm Fundamentals</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg:        #05091a;
  --bg2:       #0b1126;
  --bg3:       #111a35;
  --border:    #1c2850;
  --accent:    #00d4a0;
  --accent2:   #ff6b35;
  --accent3:   #5b8def;
  --text:      #e2eaff;
  --muted:     #5a6e99;
  --muted2:    #3a4d72;
  --green:     #00d4a0;
  --orange:    #ff6b35;
  --blue:      #5b8def;
  --red:       #ff4d6a;
  --font-head: 'Syne', sans-serif;
  --font-body: 'DM Sans', sans-serif;
  --font-mono: 'JetBrains Mono', monospace;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;background:var(--bg);color:var(--text);font-family:var(--font-body);overflow:hidden}
body{display:flex;flex-direction:column}

/* ── APP SHELL ── */
#root{display:flex;flex-direction:column;height:100vh;overflow:hidden}

/* ── TOPBAR ── */
.topbar{
  display:flex;align-items:center;justify-content:space-between;
  padding:0 24px;height:56px;
  background:var(--bg2);border-bottom:1px solid var(--border);
  flex-shrink:0;z-index:10;
}
.topbar-brand{display:flex;align-items:center;gap:10px}
.topbar-logo{font-family:var(--font-head);font-weight:800;font-size:15px;color:var(--accent);letter-spacing:.5px}
.topbar-sep{color:var(--muted2);margin:0 4px}
.topbar-course{font-size:13px;color:var(--muted);font-weight:500}
.topbar-right{display:flex;align-items:center;gap:16px}
.progress-pill{
  display:flex;align-items:center;gap:8px;
  background:var(--bg3);border:1px solid var(--border);
  border-radius:20px;padding:5px 12px;
}
.progress-pill-bar{width:80px;height:4px;background:var(--muted2);border-radius:2px;overflow:hidden}
.progress-pill-fill{height:100%;background:var(--accent);border-radius:2px;transition:width .4s ease}
.progress-pill-label{font-size:11px;color:var(--muted);font-family:var(--font-mono)}
.score-badge{
  display:flex;align-items:center;gap:5px;
  background:rgba(0,212,160,.1);border:1px solid rgba(0,212,160,.2);
  border-radius:20px;padding:5px 12px;
  font-size:12px;font-family:var(--font-mono);color:var(--accent);
}

/* ── MAIN CONTENT ── */
.app-body{display:flex;flex:1;overflow:hidden}

/* ── SIDEBAR ── */
.sidebar{
  width:260px;flex-shrink:0;
  background:var(--bg2);border-right:1px solid var(--border);
  overflow-y:auto;display:flex;flex-direction:column;
}
.sidebar::-webkit-scrollbar{width:4px}
.sidebar::-webkit-scrollbar-track{background:transparent}
.sidebar::-webkit-scrollbar-thumb{background:var(--muted2);border-radius:2px}
.sidebar-header{padding:16px;border-bottom:1px solid var(--border)}
.sidebar-title{font-family:var(--font-head);font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:1.5px}
.lesson-item{
  display:flex;align-items:center;gap:12px;
  padding:11px 16px;cursor:pointer;
  border-bottom:1px solid rgba(28,40,80,.5);
  transition:background .15s;position:relative;
}
.lesson-item:hover{background:rgba(91,141,239,.05)}
.lesson-item.active{background:rgba(0,212,160,.07);border-right:3px solid var(--accent)}
.lesson-item.completed .lesson-dot{background:var(--accent)!important;border-color:var(--accent)!important}
.lesson-dot{
  width:28px;height:28px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:12px;flex-shrink:0;
  border:2px solid var(--muted2);background:transparent;
  transition:all .2s;
}
.lesson-item.active .lesson-dot{border-color:var(--accent);background:rgba(0,212,160,.15)}
.lesson-meta{flex:1;min-width:0}
.lesson-name{font-size:12.5px;font-weight:600;color:var(--text);line-height:1.3;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.lesson-item.active .lesson-name{color:var(--accent)}
.lesson-dur{font-size:10.5px;color:var(--muted);margin-top:2px;font-family:var(--font-mono)}
.lesson-check{font-size:13px;color:var(--accent)}

/* ── MAIN AREA ── */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;background:var(--bg)}

/* ── AUDIO PLAYER BAR ── */
.audio-bar{
  background:var(--bg2);border-bottom:1px solid var(--border);
  padding:10px 24px;display:flex;align-items:center;gap:16px;
  flex-shrink:0;
}
.audio-controls{display:flex;align-items:center;gap:10px}
.btn-play{
  width:36px;height:36px;border-radius:50%;
  background:var(--accent);border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:transform .1s,background .15s;color:#000;font-size:14px;
}
.btn-play:hover{background:#00f0b5;transform:scale(1.05)}
.btn-play:active{transform:scale(.95)}
.btn-skip{
  width:28px;height:28px;border-radius:50%;
  background:var(--bg3);border:1px solid var(--border);cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  color:var(--muted);font-size:11px;transition:all .15s;
}
.btn-skip:hover{border-color:var(--accent);color:var(--accent)}
.audio-info{flex:1;min-width:0}
.audio-title{font-size:12px;color:var(--muted);margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.audio-progress{height:4px;background:var(--muted2);border-radius:2px;cursor:pointer;position:relative}
.audio-progress-fill{height:100%;background:var(--accent);border-radius:2px;transition:width .1s linear}
.audio-progress:hover .audio-progress-thumb{opacity:1}
.audio-progress-thumb{
  position:absolute;top:50%;transform:translate(-50%,-50%);
  width:10px;height:10px;border-radius:50%;background:var(--accent);
  opacity:0;transition:opacity .15s;pointer-events:none;
}
.audio-time{font-size:11px;color:var(--muted);font-family:var(--font-mono);white-space:nowrap}
.audio-parts{display:flex;gap:4px;align-items:center}
.part-dot{
  width:6px;height:6px;border-radius:50%;background:var(--muted2);
  cursor:pointer;transition:background .15s;
}
.part-dot.active{background:var(--accent)}
.part-dot.played{background:rgba(0,212,160,.4)}

/* ── SLIDE AREA ── */
.slide-area{flex:1;overflow:hidden;display:flex;flex-direction:column;position:relative}
.slide-container{flex:1;overflow-y:auto;padding:32px;display:flex;justify-content:center}
.slide-container::-webkit-scrollbar{width:4px}
.slide-container::-webkit-scrollbar-thumb{background:var(--muted2);border-radius:2px}
.slide-wrap{width:100%;max-width:760px;animation:slideIn .35s ease}
@keyframes slideIn{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}

/* ── SLIDE NAV FOOTER ── */
.slide-nav{
  background:var(--bg2);border-top:1px solid var(--border);
  padding:12px 24px;display:flex;align-items:center;justify-content:space-between;
  flex-shrink:0;
}
.slide-dots{display:flex;gap:6px;align-items:center}
.sdot{
  width:7px;height:7px;border-radius:50%;background:var(--muted2);
  cursor:pointer;transition:all .2s;
}
.sdot.active{width:20px;border-radius:4px;background:var(--accent)}
.sdot.done{background:rgba(0,212,160,.5)}
.nav-btn{
  display:flex;align-items:center;gap:6px;
  padding:8px 18px;border-radius:8px;border:1px solid var(--border);
  background:var(--bg3);color:var(--text);cursor:pointer;
  font-size:13px;font-weight:500;transition:all .15s;font-family:var(--font-body);
}
.nav-btn:hover{border-color:var(--accent);color:var(--accent)}
.nav-btn.primary{background:var(--accent);color:#000;border-color:var(--accent)}
.nav-btn.primary:hover{background:#00f0b5}
.nav-btn:disabled{opacity:.35;cursor:not-allowed}
.slide-counter{font-size:12px;color:var(--muted);font-family:var(--font-mono)}

/* ═══════════════════════════════
   SLIDE TYPES
═══════════════════════════════ */

/* COVER */
.slide-cover{
  min-height:380px;display:flex;flex-direction:column;
  align-items:center;justify-content:center;text-align:center;
  padding:40px 24px;
  background:linear-gradient(135deg,rgba(0,212,160,.06) 0%,rgba(91,141,239,.04) 100%);
  border:1px solid var(--border);border-radius:16px;position:relative;overflow:hidden;
}
.slide-cover::before{
  content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse at 50% 0%,rgba(0,212,160,.12) 0%,transparent 65%);
  pointer-events:none;
}
.cover-badge{
  display:inline-block;padding:5px 14px;border-radius:20px;
  background:rgba(0,212,160,.1);border:1px solid rgba(0,212,160,.25);
  font-size:11px;font-weight:700;color:var(--accent);letter-spacing:1px;
  text-transform:uppercase;margin-bottom:20px;font-family:var(--font-mono);
}
.cover-title{
  font-family:var(--font-head);font-size:clamp(24px,4vw,36px);
  font-weight:800;color:var(--text);line-height:1.2;margin-bottom:12px;
}
.cover-sub{font-size:15px;color:var(--muted);margin-bottom:30px;font-weight:400}
.cover-highlights{
  display:flex;flex-wrap:wrap;gap:8px;justify-content:center;
}
.cover-hl{
  padding:6px 14px;border-radius:20px;
  background:var(--bg3);border:1px solid var(--border);
  font-size:12px;color:var(--text);font-weight:500;
}

/* DEFINITION */
.slide-definition{background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:32px;overflow:hidden}
.slide-icon{font-size:28px;margin-bottom:16px;display:block}
.slide-h{font-family:var(--font-head);font-size:clamp(18px,2.5vw,24px);font-weight:700;color:var(--text);margin-bottom:20px}
.def-box{
  background:rgba(0,212,160,.06);border-left:3px solid var(--accent);
  border-radius:0 8px 8px 0;padding:16px 20px;margin:16px 0;
}
.def-term{font-family:var(--font-mono);font-size:11px;color:var(--accent);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px}
.def-text{font-size:14px;color:var(--text);line-height:1.7}
.def-tags{display:flex;flex-wrap:wrap;gap:6px;margin:16px 0}
.def-tag{
  padding:4px 12px;border-radius:20px;
  background:var(--bg3);border:1px solid var(--border);
  font-size:11px;color:var(--muted);font-weight:500;
}
.def-note{
  background:rgba(91,141,239,.07);border:1px solid rgba(91,141,239,.15);
  border-radius:8px;padding:12px 16px;margin-top:16px;
  font-size:13px;color:var(--blue);font-style:italic;line-height:1.6;
}

/* LIST */
.slide-list{background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:32px}
.slide-intro{font-size:14px;color:var(--muted);margin-bottom:20px;line-height:1.6}
.list-items{display:flex;flex-direction:column;gap:10px}
.list-item{
  display:flex;align-items:flex-start;gap:12px;
  padding:12px 16px;background:var(--bg3);border:1px solid var(--border);border-radius:10px;
  animation:fadeUp .3s ease both;
  transition:border-color .15s;
}
.list-item:hover{border-color:var(--muted2)}
.list-item-icon{font-size:16px;flex-shrink:0;margin-top:1px}
.list-item-text{font-size:13.5px;color:var(--text);line-height:1.5}

/* STEPS */
.slide-steps{background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:32px}
.steps-list{display:flex;flex-direction:column;gap:12px;margin-top:16px}
.step-item{
  display:flex;gap:16px;padding:16px;
  background:var(--bg3);border:1px solid var(--border);border-radius:12px;
  animation:fadeUp .3s ease both;
}
.step-num{
  flex-shrink:0;width:36px;height:36px;border-radius:8px;
  background:rgba(0,212,160,.12);border:1px solid rgba(0,212,160,.25);
  display:flex;align-items:center;justify-content:center;
  font-family:var(--font-mono);font-size:11px;font-weight:600;color:var(--accent);
}
.step-content{}
.step-title{font-size:13.5px;font-weight:600;color:var(--text);margin-bottom:4px}
.step-desc{font-size:12.5px;color:var(--muted);line-height:1.6}

/* STATS */
.slide-stats{background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:32px}
.stats-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin:20px 0}
.stat-card{
  padding:20px;border-radius:12px;border:1px solid var(--border);
  background:var(--bg3);text-align:center;animation:fadeUp .3s ease both;
}
.stat-value{
  font-family:var(--font-head);font-size:clamp(22px,3vw,32px);
  font-weight:800;margin-bottom:6px;
}
.stat-value.green{color:var(--green)}
.stat-value.orange{color:var(--orange)}
.stat-value.blue{color:var(--blue)}
.stat-value.red{color:var(--red)}
.stat-label{font-size:12px;color:var(--muted);line-height:1.4}
.stats-note{
  background:rgba(91,141,239,.07);border:1px solid rgba(91,141,239,.15);
  border-radius:8px;padding:12px 16px;
  font-size:13px;color:var(--blue);line-height:1.6;
}

/* COMPARE */
.slide-compare{background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:32px}
.compare-table{width:100%;border-collapse:collapse;margin:16px 0;font-size:13px}
.compare-table th{
  padding:10px 14px;text-align:left;
  background:var(--bg3);border-bottom:2px solid var(--border);
  font-family:var(--font-mono);font-size:11px;text-transform:uppercase;letter-spacing:.5px;
  color:var(--muted);
}
.compare-table th:first-child{color:var(--muted);border-radius:8px 0 0 0}
.compare-table th.left-col{color:var(--orange)}
.compare-table th.right-col{color:var(--green)}
.compare-table td{
  padding:10px 14px;border-bottom:1px solid var(--border);color:var(--text);vertical-align:top;
}
.compare-table tr:last-child td{border-bottom:none}
.compare-table tr:hover td{background:rgba(255,255,255,.02)}
.compare-winner{
  margin-top:16px;padding:12px 16px;border-radius:8px;
  background:rgba(0,212,160,.07);border:1px solid rgba(0,212,160,.2);
  display:flex;align-items:center;gap:8px;
  font-size:13px;color:var(--accent);
}

/* FORMULA */
.slide-formula{background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:32px}
.formula-sections{display:flex;flex-direction:column;gap:14px;margin:20px 0}
.formula-section{border-radius:12px;padding:18px;border:1px solid var(--border);background:var(--bg3)}
.formula-section.green{border-left:3px solid var(--green)}
.formula-section.orange{border-left:3px solid var(--orange)}
.formula-section.red{border-left:3px solid var(--red)}
.formula-section.blue{border-left:3px solid var(--blue)}
.fs-name{font-family:var(--font-mono);font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px}
.fs-formula{
  font-family:var(--font-mono);font-size:14px;color:var(--accent);
  background:rgba(0,212,160,.08);padding:8px 12px;border-radius:6px;margin:8px 0;
}
.fs-example{font-size:13px;color:var(--text);margin:6px 0;line-height:1.5}
.fs-note{font-size:12px;color:var(--muted);font-style:italic;margin-top:6px}
.formula-critical{
  background:rgba(255,77,106,.07);border:1px solid rgba(255,77,106,.2);
  border-radius:8px;padding:14px 16px;
  font-size:13px;font-weight:600;color:var(--red);
}

/* SCENARIO */
.slide-scenario{background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:32px}
.scenario-box{background:var(--bg3);border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-top:16px}
.scenario-setup{padding:16px 20px;border-bottom:1px solid var(--border)}
.scenario-label{font-family:var(--font-mono);font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px}
.scenario-text{font-size:13.5px;color:var(--text);line-height:1.6}
.scenario-event{padding:16px 20px;border-bottom:1px solid var(--border);background:rgba(255,107,53,.04)}
.scenario-question{padding:16px 20px;border-bottom:1px solid var(--border);background:rgba(91,141,239,.05)}
.scenario-answer{padding:16px 20px;background:rgba(0,212,160,.05)}
.scenario-answer .scenario-text{color:var(--accent);font-weight:600}
.scenario-lesson{
  padding:14px 20px;background:var(--bg2);border-top:2px solid var(--accent);
  font-size:13px;color:var(--text);line-height:1.6;font-style:italic;
}

/* PROMO */
.slide-promo{
  background:linear-gradient(135deg,rgba(0,212,160,.08) 0%,rgba(91,141,239,.06) 100%);
  border:1px solid rgba(0,212,160,.2);border-radius:16px;padding:32px;
  position:relative;overflow:hidden;
}
.slide-promo::after{
  content:'⚡';position:absolute;right:24px;top:50%;transform:translateY(-50%);
  font-size:80px;opacity:.05;
}
.promo-brand{
  font-family:var(--font-head);font-size:20px;font-weight:800;
  color:var(--accent);margin-bottom:12px;
}
.promo-desc{font-size:14px;color:var(--text);line-height:1.7;margin-bottom:20px}
.promo-links{display:flex;flex-wrap:wrap;gap:8px}
.promo-link{
  display:inline-flex;align-items:center;gap:6px;
  padding:9px 16px;border-radius:8px;text-decoration:none;
  background:rgba(0,212,160,.1);border:1px solid rgba(0,212,160,.25);
  font-size:13px;font-weight:600;color:var(--accent);
  transition:all .15s;
}
.promo-link:hover{background:rgba(0,212,160,.2);transform:translateY(-1px)}

/* ═══════════════════════════════
   QUIZ
═══════════════════════════════ */
.quiz-slide{background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:32px}
.quiz-header{display:flex;align-items:center;gap:10px;margin-bottom:24px}
.quiz-badge{
  padding:5px 12px;border-radius:20px;
  background:rgba(255,107,53,.1);border:1px solid rgba(255,107,53,.25);
  font-size:11px;font-weight:700;color:var(--orange);text-transform:uppercase;
  letter-spacing:1px;font-family:var(--font-mono);
}
.quiz-title{font-family:var(--font-head);font-size:18px;font-weight:700;color:var(--text)}
.quiz-question-block{margin-bottom:24px}
.quiz-q-num{font-family:var(--font-mono);font-size:11px;color:var(--muted);text-transform:uppercase;margin-bottom:8px}
.quiz-q-text{font-size:15px;font-weight:600;color:var(--text);line-height:1.5;margin-bottom:14px}
.quiz-options{display:flex;flex-direction:column;gap:8px}
.quiz-option{
  display:flex;align-items:center;gap:12px;
  padding:12px 16px;border-radius:10px;cursor:pointer;
  border:1px solid var(--border);background:var(--bg3);
  transition:all .15s;font-size:13.5px;color:var(--text);text-align:left;
  font-family:var(--font-body);width:100%;
}
.quiz-option:hover:not(:disabled){border-color:var(--accent);background:rgba(0,212,160,.06)}
.quiz-option.correct{border-color:var(--green)!important;background:rgba(0,212,160,.08)!important;color:var(--green)}
.quiz-option.wrong{border-color:var(--red)!important;background:rgba(255,77,106,.06)!important;color:var(--red)}
.quiz-option-letter{
  width:24px;height:24px;border-radius:6px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  background:var(--bg2);border:1px solid var(--border);
  font-size:11px;font-weight:700;font-family:var(--font-mono);
}
.quiz-option.correct .quiz-option-letter{background:var(--green);border-color:var(--green);color:#000}
.quiz-option.wrong .quiz-option-letter{background:var(--red);border-color:var(--red);color:#fff}
.quiz-explanation{
  margin-top:12px;padding:12px 16px;border-radius:8px;
  background:rgba(91,141,239,.07);border:1px solid rgba(91,141,239,.15);
  font-size:13px;color:var(--blue);line-height:1.6;
}
.quiz-score-final{
  text-align:center;padding:24px;background:var(--bg3);
  border-radius:12px;border:1px solid var(--border);margin-top:16px;
}
.quiz-score-val{
  font-family:var(--font-head);font-size:48px;font-weight:800;
  color:var(--accent);line-height:1;margin-bottom:8px;
}
.quiz-score-label{font-size:14px;color:var(--muted)}
.quiz-next-btn{
  display:flex;align-items:center;justify-content:center;gap:6px;

function SlideRenderer({ slide, key: _k }) {
  const { type } = slide;
  if (type === 'cover')       return <SlideCover s={slide}/>;
  if (type === 'definition')  return <SlideDef s={slide}/>;
  if (type === 'list')        return <SlideList s={slide}/>;
  if (type === 'steps')       return <SlideSteps s={slide}/>;
  if (type === 'stats')       return <SlideStats s={slide}/>;
  if (type === 'compare')     return <SlideCompare s={slide}/>;
  if (type === 'formula')     return <SlideFormula s={slide}/>;
  if (type === 'scenario')    return <SlideScenario s={slide}/>;
  if (type === 'promo')       return <SlidePromo s={slide}/>;
  return null;
}

function SlideCover({s}) {
  return (
    <div className="slide-cover">
      <div className="cover-badge">{s.badge}</div>
      <div className="cover-title">{s.title}</div>

// QUIZ COMPONENT
// ═══════════════════════════════════════════════════
function QuizSlide({ quiz, onComplete, quizAnswers, setQuizAnswers }) {
  const [current, setCurrent] = useState(0);
  const [showExplanation, setShowExplanation] = useState(false);
  const [done, setDone] = useState(false);

  const q = quiz.questions[current];
  const answered = quizAnswers[q.id];

  const handleOption = (idx) => {
    if (answered !== undefined) return;
    setQuizAnswers(prev => ({...prev, [q.id]: idx}));
    setShowExplanation(true);
  };

  const handleNext = () => {
    if (current + 1 < quiz.questions.length) {
      setCurrent(c => c + 1);
      setShowExplanation(false);
    } else {
      setDone(true);
    }
  };

  const score = quiz.questions.filter(q2 => quizAnswers[q2.id] === q2.correct).length;

  if (done) {
    const pct = Math.round((score / quiz.questions.length) * 100);
    return (
      <div className="quiz-slide">
        <div className="quiz-header">
          <span className="quiz-badge">Quiz Complete</span>
          <span className="quiz-title">{quiz.title}</span>
        </div>
        <div className="quiz-score-final">
          <div className="quiz-score-val">{pct}%</div>
          <div className="quiz-score-label">
            {score}/{quiz.questions.length} correct — {pct >= 80 ? '🏆 Excellent! Ready for the next lesson.' : pct >= 50 ? '👍 Good job! Review the lesson to improve.' : '📚 Review this lesson and try again.'}
          </div>
        </div>
        <button className="quiz-next-btn" onClick={onComplete}>Continue to Next Lesson →</button>
      </div>
    );
  }

  const letters = ['A','B','C','D'];

  return (
    <div className="quiz-slide">
      <div className="quiz-header">
        <span className="quiz-badge">Quiz</span>
        <span className="quiz-title">{quiz.title}</span>
      </div>
      <div className="quiz-question-block">
        <div className="quiz-q-num">Question {current + 1} of {quiz.questions.length}</div>
        <div className="quiz-q-text">{q.question}</div>
        <div className="quiz-options">
          {q.options.map((opt, idx) => {
            let cls = 'quiz-option';
            if (answered !== undefined) {
              if (idx === q.correct) cls += ' correct';
              else if (idx === answered && answered !== q.correct) cls += ' wrong';
            }
            return (
              <button key={idx} className={cls} onClick={() => handleOption(idx)} disabled={answered !== undefined}>
                <span className="quiz-option-letter">{letters[idx]}</span>
                {opt}
              </button>
            );
          })}
        </div>
        {showExplanation && answered !== undefined && (
          <div className="quiz-explanation">
            {answered === q.correct ? '✅ Correct! ' : '❌ Not quite. '}
            {q.explanation}
          </div>
        )}
      </div>
      {answered !== undefined && (
        <button className="quiz-next-btn" onClick={handleNext}>
          {current + 1 < quiz.questions.length ? 'Next Question →' : 'See Results →'}
        </button>
      )}
    </div>
  );
}

// AUDIO PLAYER
// ═══════════════════════════════════════════════════
function AudioPlayer({ audioFiles, lessonKey }) {
  const [partIdx, setPartIdx] = useState(0);
  const [playing, setPlaying] = useState(false);
  const [progress, setProgress] = useState(0);
  const [currentTime, setCurrentTime] = useState(0);
  const [duration, setDuration] = useState(0);
  const audioRef = useRef(null);

  // Reset when lesson changes
  useEffect(() => {
    setPartIdx(0);
    setPlaying(false);
    setProgress(0);
    setCurrentTime(0);
    setDuration(0);
  }, [lessonKey]);

  // Update src when part changes
  useEffect(() => {
    if (audioRef.current) {
      audioRef.current.src = audioFiles[partIdx];
      audioRef.current.load();
      if (playing) audioRef.current.play().catch(() => {});
    }
  }, [partIdx]);

  const togglePlay = () => {
    if (!audioRef.current) return;
    if (playing) {
      audioRef.current.pause();
      setPlaying(false);
    } else {
      audioRef.current.play().then(() => setPlaying(true)).catch(() => setPlaying(false));
    }
  };

  const handleTimeUpdate = () => {
    if (!audioRef.current) return;
    const t = audioRef.current.currentTime;
    const d = audioRef.current.duration || 0;
    setCurrentTime(t);
    setDuration(d);
    setProgress(d > 0 ? (t / d) * 100 : 0);
  };

  const handleEnded = () => {
    if (partIdx + 1 < audioFiles.length) {
      setPartIdx(p => p + 1);
      setPlaying(true);
      setTimeout(() => {
        if (audioRef.current) audioRef.current.play().catch(() => {});
      }, 200);
    } else {
      setPlaying(false);
      setProgress(100);
    }
  };

  const seekTo = (e) => {
    if (!audioRef.current || !duration) return;
    const rect = e.currentTarget.getBoundingClientRect();
    const pct = (e.clientX - rect.left) / rect.width;
    audioRef.current.currentTime = pct * duration;
  };

  const fmt = (s) => {
    if (!s || isNaN(s)) return '0:00';
    const m = Math.floor(s / 60);
    const sec = Math.floor(s % 60);
    return `${m}:${sec.toString().padStart(2,'0')}`;
  };

  const partName = audioFiles[partIdx]?.split('/').pop().replace('.mp3','') || '';

  return (
    <div className="audio-bar">
      <audio ref={audioRef} onTimeUpdate={handleTimeUpdate} onEnded={handleEnded} onLoadedMetadata={handleTimeUpdate}/>
      <div className="audio-controls">
        <button className="btn-skip" onClick={() => { setPartIdx(Math.max(0, partIdx-1)); }}>⏮</button>
        <button className="btn-play" onClick={togglePlay}>
          {playing ? '⏸' : '▶'}
        </button>
        <button className="btn-skip" onClick={() => { if (partIdx+1 < audioFiles.length) setPartIdx(p=>p+1); }}>⏭</button>
      </div>
      <div className="audio-info">
        <div className="audio-title">🎧 {partName}</div>
        <div className="audio-progress" onClick={seekTo}>
          <div className="audio-progress-fill" style={{width:`${progress}%`}}/>
        </div>
      </div>
      <div className="audio-time">{fmt(currentTime)} / {fmt(duration)}</div>
      {audioFiles.length > 1 && (
        <div className="audio-parts">
          {audioFiles.map((_,i) => (
            <div key={i} className={`part-dot ${i === partIdx ? 'active' : i < partIdx ? 'played' : ''}`}
              onClick={() => { setPartIdx(i); setPlaying(false); }}
              title={`Part ${i+1}`}/>
          ))}
        </div>
      )}
    </div>
  );
}

    setSlideIdx(idx);
    setShowQuiz(false);
    setSlideKey(k => k + 1);
  };

  const goToLesson = (idx) => {
    setLessonIdx(idx);
    setSlideIdx(0);
    setShowQuiz(false);
    setSlideKey(k => k + 1);
  };

  const nextSlide = () => {
    if (slideIdx + 1 < totalSlides) {
      goToSlide(slideIdx + 1);
    } else if (lesson.quiz) {
      setShowQuiz(true);
      setSlideKey(k => k + 1);
    } else {
      completeLesson();
    }
  };

  const completeLesson = () => {
    setCompletedLessons(prev => new Set([...prev, lesson.id]));
    if (lessonIdx + 1 < COURSE_DATA.length) {
      goToLesson(lessonIdx + 1);
    }
  };

  const handleQuizComplete = () => {
    completeLesson();
  };

  return (
    <div id="root">
      {/* TOPBAR */}
      <div className="topbar">
        <div className="topbar-brand">
          <span className="topbar-logo">PropFirmScanner</span>
          <span className="topbar-sep">/</span>
          <span className="topbar-course">Prop Firm Fundamentals</span>
        </div>
        <div className="topbar-right">
          <div className="progress-pill">
            <div className="progress-pill-bar"><div className="progress-pill-fill" style={{width:`${progressPct}%`}}/></div>
            <span className="progress-pill-label">{completedCount}/{totalLessons}</span>
          </div>
          {totalQuizQuestions > 0 && (
            <div className="score-badge">🏆 {answeredCorrect}/{totalQuizQuestions}</div>
          )}
        </div>
      </div>

      {/* BODY */}
      <div className="app-body">
        {/* SIDEBAR */}
        <div className="sidebar">
          <div className="sidebar-header"><div className="sidebar-title">Course Lessons</div></div>
          {COURSE_DATA.map((l, i) => (
            <div key={l.id}
              className={`lesson-item ${i === lessonIdx ? 'active' : ''} ${completedLessons.has(l.id) ? 'completed' : ''}`}
              onClick={() => goToLesson(i)}>
              <div className="lesson-dot">
                {completedLessons.has(l.id) ? '✓' : l.icon}
              </div>
              <div className="lesson-meta">
                <div className="lesson-name">{l.id === 0 ? 'Intro' : l.id === 9 ? 'Conclusion' : `L${l.id}: ${l.title}`}</div>
                <div className="lesson-dur">{l.duration}</div>
              </div>
              {completedLessons.has(l.id) && <span className="lesson-check">✓</span>}
            </div>
          ))}
        </div>

        {/* MAIN */}
        <div className="main">
          <AudioPlayer audioFiles={lesson.audioFiles} lessonKey={lesson.key}/>

          <div className="slide-area">
            <div className="slide-container">
              <div className="slide-wrap" key={slideKey}>
                {showQuiz && lesson.quiz ? (
                  <QuizSlide
                    quiz={lesson.quiz}
                    onComplete={handleQuizComplete}
                    quizAnswers={quizAnswers}
                    setQuizAnswers={setQuizAnswers}
                  />
                ) : (
                  <SlideRenderer slide={lesson.slides[slideIdx]}/>
                )}
              </div>
            </div>

            {/* SLIDE NAV */}
            <div className="slide-nav">
              <button className="nav-btn" onClick={() => {
                if (showQuiz) { setShowQuiz(false); setSlideKey(k=>k+1); }
                else if (slideIdx > 0) goToSlide(slideIdx - 1);
                else if (lessonIdx > 0) goToLesson(lessonIdx - 1);
              }}>← Prev</button>

              <div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:6}}>
                <div className="slide-dots">
                  {lesson.slides.map((_,i) => (
                    <div key={i} className={`sdot ${!showQuiz && i === slideIdx ? 'active' : ''} ${!showQuiz && i < slideIdx ? 'done' : ''}`}
                      onClick={() => goToSlide(i)}/>
                  ))}
                  {lesson.quiz && <div className={`sdot ${showQuiz ? 'active' : ''}`} title="Quiz" style={{background: showQuiz ? 'var(--orange)' : undefined}} onClick={() => { setShowQuiz(true); setSlideKey(k=>k+1); }}/>}
                </div>
                <div className="slide-counter">
                  {showQuiz ? 'Quiz' : `${slideIdx + 1} / ${totalSlides}`}
                  {' · '}{lesson.icon} {lesson.id === 0 ? 'Introduction' : lesson.id === 9 ? 'Conclusion' : `Lesson ${lesson.id}`}
                </div>
              </div>

              <button className="nav-btn primary" onClick={() => {
                if (showQuiz) return;
                nextSlide();
              }} disabled={showQuiz}>
                {slideIdx + 1 < totalSlides ? 'Next →' : lesson.quiz ? 'Take Quiz →' : 'Complete ✓'}
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
